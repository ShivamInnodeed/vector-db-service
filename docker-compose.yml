# Optional: run only Elasticsearch via Docker. The VectorDB module runs on your host;
# all config (URLs, etc.) is from environment variables / .env (see .env.example).

services:
  elasticsearch:
    image: elasticsearch:9.2.1
    container_name: vectordb-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
